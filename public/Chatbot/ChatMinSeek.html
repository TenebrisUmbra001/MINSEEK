<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat IACCR version Beta 0.1</title>
  <link rel="stylesheet" href="ChatMinSeek.css">
  <link rel="shortcut icon" href="../Assets/LOGO IA CCR.png" type="image/x-icon">
</head>

<body>

  <div class="bg-glow g1"></div>
  <div class="bg-glow g2"></div>
  <div class="bg-glow g3"></div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon" onclick="window.location.href='ChatMinSeek.html'">
          <img src="../Assets/LOGO IA CCR.png" alt="">
        </div>
        <div class="sidebar-logo-text">
          <strong>IACCR</strong>

        </div>
      </div>
      <button onclick="window.location.replace('ChatMinSeek.html')" class="btn-new-chat" id="btnNewChat">
        <svg viewBox="0 0 24 24">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        Nueva conversacion
      </button>
    </div>
    <div class="sidebar-scroll" id="sidebarScroll"></div>
    <div class="sidebar-footer">
      
        <p>&copy; 2026 CCR MININT Pinar del Rio. Todos los derechos reservados.</p>
  
    </div>
  </aside>

  <div class="main">
    <header class="chat-header">
      <div class="chat-header-left">
        <button class="btn-toggle" id="btnToggle" title="Mostrar/ocultar lateral">
          <svg id="iconToggle" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <line x1="9" y1="3" x2="9" y2="21" />
          </svg>
        </button>
        <div class="chat-header-status">
          <div class="status-dot"></div>
          <span>En linea</span>
        </div>
      </div>

    </header>

    <div class="chat-wrapper">
      <div class="chat-container" id="chatContainer">
        <div class="welcome-state" id="welcomeState">
          <div class="welcome-icon">
            <img draggable="false" src="../Assets/LOGO IA CCR.png" alt="">
          </div>
          <h2>Inicia una conversacion</h2>
          <p>Escribe tu consulta abajo.</p>

        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="file-preview" id="filePreview">
        <div class="file-preview-icon">
          <svg viewBox="0 0 24 24">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
          </svg>
        </div>
        <div class="file-preview-info">
          <span class="file-preview-name" id="filePreviewName"></span>
          <span class="file-preview-size" id="filePreviewSize"></span>
        </div>
        <button class="file-preview-remove" id="filePreviewRemove" title="Quitar archivo">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="input-wrapper">
        <input type="file" id="fileInput" style="display:none"
          accept=".pdf,.doc,.docx,.txt,.xls,.xlsx,.ppt,.pptx,.odt,.ods,.odp,.rtf,.csv,.md,.json,.xml,.html,.htm,.png,.jpg,.jpeg,.gif,.bmp,.webp" />
        <button class="btn-attach" id="attachBtn" title="Adjuntar documento">
          <svg viewBox="0 0 24 24">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
          </svg>
        </button>
        <input type="text" id="userInput" placeholder="Escribe tu mensaje..." autocomplete="off" />
        <button class="btn-send" id="sendBtn">
          <svg viewBox="0 0 24 24">
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter para enviar &middot; Modelo ejecutándose en infraestructura local</div>
    </div>
  </div>

  <script src="index.js"></script>
</body>

</html>
